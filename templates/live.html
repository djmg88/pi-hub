<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Live — Pi Hub</title>
    <style>
        :root {
            --bg: #070b12;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.09);
            --accent2: #00ff9d;
            --text: rgba(255,255,255,0.92);
            --text-muted: rgba(255,255,255,0.55);
            --text-dim: rgba(255,255,255,0.28);
            --mono: "SF Mono", "Fira Code", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); min-height: 100vh; padding: 20px 16px 24px; }
        .top-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
        .back-btn { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; border: 1px solid var(--glass-border); border-radius: 20px; padding: 6px 14px; transition: color 0.2s, border-color 0.2s; }
        .back-btn:hover { color: var(--text-muted); border-color: rgba(255,255,255,0.2); }
        .page-title { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim); }
        .feeds { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1000px; margin: 0 auto; }
        @media (max-width: 600px) { .feeds { grid-template-columns: 1fr; } }
        .feed-block { display: flex; flex-direction: column; gap: 8px; }
        .feed-label { font-family: var(--mono); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); text-align: center; }
        .stream-container { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        .stream-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .offline-msg { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
        .controls { display: flex; align-items: center; justify-content: space-between; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 14px; }
        .mic-status { display: flex; align-items: center; gap: 8px; }
        .mic-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
        .mic-dot.active { background: var(--accent2); box-shadow: 0 0 6px rgba(0,255,157,0.5); }
        .mic-dot.muted { background: rgba(239,35,60,0.7); }
        .mic-label { font-family: var(--mono); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        .mic-btn { font-family: var(--mono); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .mic-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
        .mic-btn:disabled { opacity: 0.3; cursor: default; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-btn" href="/">← Back</a>
        <div class="page-title">Live</div>
    </div>

    <div class="feeds">
        <div class="feed-block">
            <div class="feed-label">MSI — Media</div>
            <div class="stream-container" id="container-msi">
                <img id="stream-msi" onerror="showOffline(msi)">
            </div>
            <div class="controls">
                <div class="mic-status">
                    <div class="mic-dot unknown" id="dot-msi"></div>
                    <div class="mic-label" id="label-msi">Mic —</div>
                </div>
                <button class="mic-btn" id="btn-msi" onclick="toggleMic(msi)" disabled>Toggle</button>
            </div>
        </div>

        <div class="feed-block">
            <div class="feed-label">Lenovo — Storage</div>
            <div class="stream-container" id="container-lenovo">
                <img id="stream-lenovo" onerror="showOffline(lenovo)">
            </div>
            <div class="controls">
                <div class="mic-status">
                    <div class="mic-dot unknown" id="dot-lenovo"></div>
                    <div class="mic-label" id="label-lenovo">Mic —</div>
                </div>
                <button class="mic-btn" id="btn-lenovo" onclick="toggleMic(lenovo)" disabled>Toggle</button>
            </div>
        </div>
    </div>

    <script>
        function showOffline(machine) {
            const container = document.getElementById("container-" + machine);
            container.innerHTML = "<div class=\"offline-msg\">Offline</div>";
        }

        function loadStream(machine) {
            const container = document.getElementById("container-" + machine);
            container.innerHTML = "<img id=\"stream-" + machine + "\">";
            const img = document.getElementById("stream-" + machine);
            img.onerror = () => showOffline(machine);
            img.src = "/api/live/stream/" + machine;
        }

        async function updateMicStatus(machine) {
            const dot = document.getElementById("dot-" + machine);
            const label = document.getElementById("label-" + machine);
            const btn = document.getElementById("btn-" + machine);
            try {
                const r = await fetch("/api/live/mic/" + machine + "/status");
                if (!r.ok) throw new Error();
                const data = await r.json();
                if (data.offline || data.muted === null) {
                    dot.className = "mic-dot unknown";
                    label.textContent = "Mic — Offline";
                    btn.disabled = true;
                } else if (data.muted) {
                    dot.className = "mic-dot muted";
                    label.textContent = "Mic — Muted";
                    btn.disabled = false;
                    btn.textContent = "Unmute";
                } else {
                    dot.className = "mic-dot active";
                    label.textContent = "Mic — Live";
                    btn.disabled = false;
                    btn.textContent = "Mute";
                }
            } catch {
                dot.className = "mic-dot unknown";
                label.textContent = "Mic — Offline";
                btn.disabled = true;
            }
        }

        async function toggleMic(machine) {
            document.getElementById("btn-" + machine).disabled = true;
            try {
                await fetch("/api/live/mic/" + machine + "/toggle", { method: "POST" });
                await updateMicStatus(machine);
            } catch {
                document.getElementById("btn-" + machine).disabled = false;
            }
        }

        loadStream("msi");
        loadStream("lenovo");
        updateMicStatus("msi");
        updateMicStatus("lenovo");
        setInterval(() => { updateMicStatus("msi"); updateMicStatus("lenovo"); }, 5000);
    </script>
</body>
</html>
